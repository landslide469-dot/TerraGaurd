<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraGuard - Settings</title>
    <link rel="stylesheet" href="{{url_for('static',filename='settings_style.css')}}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="app-container">
        <header class="search-header">
            <div class="header-pill">
                <i data-lucide="chevron-left" class="back-btn" onclick="history.back()"></i>
                <h2>Settings</h2>
                <div style="width: 24px;">

                  <i data-lucide="settings" class="back-btn" onclick="history.back()"></i>                  
                </div> </div>
        </header>

        <main class="settings-content">
            <section class="settings-group app-identity">
                <div class="app-logo-placeholder">TG</div>
                <h1>TerraGuard</h1>
                <p class="version-text">Version 1.0.4-stable</p>
            </section>

            <section class="settings-section">
                <h3>Appearance</h3>
                <div class="settings-card">
                    <div class="settings-row">
                        <div class="setting-label">
                            <i data-lucide="moon"></i>
                            <span>Dark Mode</span>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="theme-toggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </section>

            <section class="settings-section">
                <h3>Support & Info</h3>
                <div class="settings-card">
                    <div class="settings-row clickable">
                        <div class="setting-label">
                            <i data-lucide="help-circle"></i>
                            <span>Help Center</span>
                        </div>
                        <i data-lucide="chevron-right" class="small-icon"></i>
                    </div>
                    <div class="settings-row clickable">
                        <div class="setting-label">
                            <i data-lucide="mail"></i>
                            <span>Contact Us</span>
                        </div>
                        <i data-lucide="chevron-right" class="small-icon"></i>
                    </div>
                </section>
        </main>

        <footer class="settings-footer">
            <p>© 2026 TerraGuard Inc.</p>
        </footer>
    </div>

    <script>
        lucide.createIcons();
        
        // Simple Theme Toggle Logic
        const toggle = document.getElementById('theme-toggle');
        toggle.addEventListener('change', () => {
            document.body.classList.toggle('dark-theme');
        });
    </script>
</body>
</html>
