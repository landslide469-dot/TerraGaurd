<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraGuard - Find Shelters</title>
    <link rel="stylesheet" href="{{url_for('static',filename='shelter_style.css')}}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="app-container">
        <header class="search-header">
            <div class="header-pill">
                <i data-lucide="chevron-left" class="back-btn" onclick="window.history.back()"></i>
                <h2>Find Shelters</h2>
                <i data-lucide="home" class="header-icon"></i>
            </div>
        </header>

        <section class="quick-actions">
            <div class="action-box">
                <i data-lucide="map-pin"></i>
                <span>Near-me</span>
            </div>
            <div class="action-box">
                <i data-lucide="search"></i>
                <span>Search location</span>
            </div>
        </section>

        <main class="shelter-content">
            <div class="shelter-group">
                <h3><i data-lucide="chevron-right"></i> Kalpetta</h3>
                
                <ul class="shelter-list">
                    <li>
                        <span>SKMJ</span>
                        <div class="btn-group">
                            <button class="mini-btn"><i data-lucide="phone"></i></button>
                            <button class="mini-btn"><i data-lucide="map-pin"></i></button>
                        </div>
                    </li>
                    <li>
                        <span>Civil Station</span>
                        <div class="btn-group">
                            <button class="mini-btn"><i data-lucide="phone"></i></button>
                            <button class="mini-btn"><i data-lucide="map-pin"></i></button>
                        </div>
                    </li>
                    <li>
                        <span>NMSM Govt College</span>
                        <div class="btn-group">
                            <button class="mini-btn"><i data-lucide="phone"></i></button>
                            <button class="mini-btn"><i data-lucide="map-pin"></i></button>
                        </div>
                    </li>
                </ul>
            </div>


            <div class="shelter-group">
                <h3><i data-lucide="chevron-right"></i> Sulthan Bathery</h3>
                
                                <ul class="shelter-list">
                    <li>
                        <span>SKMJ</span>
                        <div class="btn-group">
                            <button class="mini-btn"><i data-lucide="phone"></i></button>
                            <button class="mini-btn"><i data-lucide="map-pin"></i></button>
                        </div>
                    </li>
                    <li>
                        <span>Civil Station</span>
                        <div class="btn-group">
                            <button class="mini-btn"><i data-lucide="phone"></i></button>
                            <button class="mini-btn"><i data-lucide="map-pin"></i></button>
                        </div>
                    </li>
                    <li>
                        <span>NMSM Govt College</span>
                        <div class="btn-group">
                            <button class="mini-btn"><i data-lucide="phone"></i></button>
                            <button class="mini-btn"><i data-lucide="map-pin"></i></button>
                        </div>
                    </li>
                </ul>
                
                
            </div>
        </main>

        <section class="map-container">
            <h3>Map View</h3>
            <div class="map-placeholder">
                <i data-lucide="navigation" class="nav-arrow"></i>
                <p>Interactive Map View</p>
            </div>
        </section>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
