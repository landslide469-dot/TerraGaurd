<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraGuard - Emergency Contacts</title>
    <link rel="stylesheet" href="{{url_for('static',filename='contact_style.css')}}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="app-container">
        <header class="search-header">
            <div class="header-pill">
                <i data-lucide="chevron-left" class="back-btn" onclick="window.history.back();"></i>
                
                <h2>Emergency Contact</h2>
                <i data-lucide="phone" class="phone-icon"></i>
            </div>
        </header>

        <main class="contact-list">
            
            <section class="contact-group">
                <h3><i data-lucide="chevron-right"></i> DMA</h3>
                <div class="contact-card">
                    <div class="contact-row"><span>Kalpetta, DMA</span> <a href="tel:1234567890">1234567890</a></div>
                    <div class="contact-row"><span>Manandavadi, DMA</span> <a href="tel:6282088710">1234567890</a></div>
                </div>
            </section>

            <section class="contact-group">
                <h3><i data-lucide="chevron-right"></i> Police Station</h3>
                <div class="contact-card">
                    <div class="contact-row"><span>Kalpetta, SHO</span> <a href="tel:1234567">1234567</a></div>
                    <div class="contact-row"><span>Suthan Bathery, SHO</span> <a href="tel:1234567">1234567</a></div>
                </div>
            </section>

            <section class="contact-group">
                <h3><i data-lucide="chevron-right"></i> Firestation</h3>
                <div class="contact-card">
                    <div class="contact-row"><span>Kalpetta</span> <a href="tel:1234567">1234567</a></div>
                </div>
            </section>

            <section class="contact-group">
                <h3><i data-lucide="chevron-right"></i> NDRF</h3>
                <div class="contact-card">
                    <div class="contact-row"><span>HQ</span> <a href="tel:12345789">12345789</a></div>
                    <div class="contact-row"><span>Unit</span> <a href="tel:12344789">12344789</a></div>
                </div>
            </section>

        </main>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
